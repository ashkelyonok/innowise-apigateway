services:
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    ports:
      - "5433:5432"
    env_file:
      - ../Microservices/AuthService/.env
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - global-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ../Microservices/AuthService
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8082:8082"
    env_file:
      - ../Microservices/AuthService/.env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/$${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: $${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: $${POSTGRES_PASSWORD}
      application.config.user-service-url: http://user-service:8081
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - global-network

  user-db:
    image: postgres:15-alpine
    container_name: user-db
    ports:
      - "5432:5432"
    env_file:
      - ../Microservices/UserService/.env
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - global-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7.0.11-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - global-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

  user-service:
    build:
      context: ../Microservices/UserService
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    env_file:
      - ../Microservices/UserService/.env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/$${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: $${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: $${POSTGRES_PASSWORD}
      DB_HOST: user-db
      REDIS_HOST: redis-cache
    depends_on:
      user-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - global-network

  order-db:
    image: postgres:15-alpine
    container_name: order-db
    ports:
      - "5434:5432"
    env_file:
      - ../Microservices/OrderService/.env
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - global-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - global-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - global-network
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ../Microservices/OrderService
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8083:8083"
    env_file:
      - ../Microservices/OrderService/.env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/$${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: $${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: $${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      application.config.user-service-url: http://user-service:8081
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - global-network

  payment-db:
    image: mongo:7.0
    container_name: payment-db
    ports:
      - "27017:27017"
    env_file:
      - ../Microservices/PaymentService/.env
    volumes:
      - payment_db_data:/data/db
    networks:
      - global-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ../Microservices/PaymentService
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8085:8085"
    env_file:
      - ../Microservices/PaymentService/.env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - global-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AUTH_SERVICE_URL: http://auth-service:8082
      USER_SERVICE_URL: http://user-service:8081
      ORDER_SERVICE_URL: http://order-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8085
    depends_on:
      - auth-service
      - user-service
      - order-service
      - payment-service
    networks:
      - global-network

networks:
  global-network:
    driver: bridge

volumes:
  auth_db_data:
  user_db_data:
  order_db_data:
  payment_db_data:
  redis_data:
  kafka_data: